<mat-toolbar class="app-toolbar">
  <button mat-icon-button (click)="onMenuClick()" aria-label="Open menu">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-icon class="logo-icon">store</mat-icon>

  <span class="logo-text">Healfitness Webshop</span>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="search-field">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput placeholder="Search products..." />
  </mat-form-field>

  <span class="spacer"></span>

  <button
    mat-icon-button
    (click)="authResponse() === null && openLoginDialog()"
    aria-label="Profile"
    [matMenuTriggerFor]="authResponse() !== null ? userMenu : null"
  >
    <mat-icon>person</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    @if (authResponse() !== null) {
      <div class="user-info">
        <div class="user-name">
          {{ authResponse()?.userSummery?.username }}
        </div>

        <div class="user-email">
          {{ authResponse()?.userSummery?.email }}
        </div>
      </div>

      <mat-divider></mat-divider>

      <button mat-menu-item disabled="true">
        <mat-icon>person</mat-icon>
        <span>Profil</span>
      </button>

      <button mat-menu-item>
        <mat-icon>shopping_bag</mat-icon>
        <span>Bestellungen</span>
      </button>

      <mat-divider></mat-divider>

      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Abmelden</span>
      </button>
    }
  </mat-menu>

  <button mat-icon-button aria-label="Settings" class="desktop-only">
    <mat-icon>settings</mat-icon>
  </button>

  <button mat-icon-button aria-label="Shopping cart">
    <mat-icon>shopping_cart</mat-icon>
  </button>
</mat-toolbar>
