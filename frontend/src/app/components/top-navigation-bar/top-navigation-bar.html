<mat-toolbar class="app-toolbar">
  <button mat-icon-button (click)="onMenuClick()" aria-label="Open menu">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-icon class="logo-icon">store</mat-icon>

  <span class="logo-text">Healfitness Webshop</span>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="search-field">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput placeholder="Search products..." />
  </mat-form-field>

  <span class="spacer"></span>

  <button mat-icon-button aria-label="Profile">
    <mat-icon>person</mat-icon>
  </button>

  <button mat-icon-button aria-label="Settings" class="desktop-only">
    <mat-icon>settings</mat-icon>
  </button>

  <button mat-icon-button aria-label="Shopping cart">
    <mat-icon>shopping_cart</mat-icon>
  </button>
</mat-toolbar>
