spring.application.name=healfiness
server.port=8080
spring.jpa.database=POSTGRESQL
spring.datasource.platform=postgres
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.sql.init.mode=always
spring.datasource.initialize=true
spring.datasource.continue-on-error=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.show-sql=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=${spring.application.name}_schema
server.servlet.context-path=/api/v1
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=${spring.application.name}_schema
spring.flyway.schema=${spring.application.name}_schema
spring.flyway.placeholders.schema=${spring.application.name}_schema

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-millis=${JWT_EXPIRATION_MS}
security.jwt.refresh-expiration-millis=${JWT_REFRESH_EXPIRATION_MS}
security.jwt.token-prefix=Bearer
security.jwt.header-string=Authorization