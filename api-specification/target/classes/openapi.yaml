openapi: 3.1.0
info:
  title: Healfiness Webshop API
  description: Enterprise REST API for Healfiness Webshop
  version: 1.0.0

servers:
  - url: 'https://localhost:8080/api/v1'
    description: Local development server
  - url: https://api.healfiness.com/api/v1
    description: Production

tags:
  - name: Authentication
    description: Authentication operations
#  - name: Addresses
#    description: Operations related to addresses
#  - name: Categories
#    description: Operations related to categories
#  - name: Cities
#    description: Operations related to cities
#  - name: IsoCountryCodes
#    description: Operations related to ISO country codes
#  - name: Orders
#    description: Operations related to orders
#  - name: Payments
#    description: Operations related to payments
#  - name: Products
#    description: Operations related to products
#  - name: Shipments
#    description: Operations related to shipments
#  - name: ShoppingCarts
#    description: Operations related to shopping carts
  - name: Users
    description: Operations related to users

security:
  - bearerAuth: []
  - basicAuth: []

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /addresses:
    get:
      tags:
        - Addresses
      summary: Get addresses
      description: Retrieve a list of all addresses
      operationId: getAddresses
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of addresses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressPageResponse'
    post:
      tags:
        - Addresses
      summary: Create an address
      description: Create a new address with the provided details
      operationId: createAddress
      requestBody:
        required: true
        description: The address details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressCreateRequest'
      responses:
        '201':
          description: Address created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '400':
          description: Bad request - invalid address details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /categories:
    get:
      tags:
        - Categories
      summary: Get categories
      description: Retrieve a list of all categories
      operationId: getCategories
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryPageResponse'
    post:
      tags:
        - Categories
      summary: Create a category
      description: Create a new category with the provided details
      operationId: createCategory
      requestBody:
        required: true
        description: The category details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          description: Bad request - invalid category details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /cities:
    get:
      tags:
        - Cities
      summary: Get cities
      description: Retrieve a list of all cities
      operationId: getCities
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of cities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityPageResponse'
    post:
      tags:
        - Cities
      summary: Create a city
      description: Create a new city with the provided details
      operationId: createCity
      requestBody:
        required: true
        description: The city details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CityCreateRequest'
      responses:
        '201':
          description: City created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponse'
        '400':
          description: Bad request - invalid city details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /cities/{cityId}:
    get:
      tags:
        - Cities
      summary: Find city by identifier
      description: Retrieve details of a specific city by its identifier
      operationId: findCityById
      parameters:
        - name: cityId
          in: path
          required: true
          description: The ID of the city to fetch
          schema:
            type: integer
            example: "123"
      responses:
        '200':
          description: City details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponse'
        '400':
          description: Bad request - invalid city ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: City not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /isoCountryCodes:
    get:
      tags:
        - IsoCountryCodes
      summary: Get ISO country codes
      description: Retrieve a list of all ISO country codes
      operationId: getIsoCountryCodes
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of ISO country codes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IsoCountryCodePageResponse'
    post:
      tags:
        - IsoCountryCodes
      summary: Create an ISO country code
      description: Create a new ISO country code with the provided details
      operationId: createIsoCountryCode
      requestBody:
        required: true
        description: The ISO country code details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IsoCountryCodeSummary'
      responses:
        '201':
          description: ISO country code created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IsoCountryCodeSummary'
        '400':
          description: Bad request - invalid ISO country code details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /isoCountryCodes/{isoCountryCodeId}:
    get:
      tags:
        - IsoCountryCodes
      summary: Find ISO country code by identifier
      description: Retrieve details of a specific ISO country code by its identifier
      operationId: findIsoCountryCodeById
      parameters:
        - name: isoCountryCodeId
          in: path
          required: true
          description: The ID of the ISO country code to fetch
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: ISO country code details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IsoCountryCodeSummary'
        '400':
          description: Bad request - invalid ISO country code ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: ISO country code not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /orders:
    get:
      tags:
        - Orders
      summary: Get orders
      description: Retrieve a list of all orders
      operationId: getOrders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageResponse'
    post:
      tags:
        - Orders
      summary: Create an order
      description: Create a new order with the provided details
      operationId: createOrder
      requestBody:
        required: true
        description: The order details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request - invalid order details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Find order by identifier
      description: Retrieve details of a specific order by its identifier
      operationId: findOrderById
      parameters:
        - name: orderId
          in: path
          required: true
          description: The ID of the order to fetch
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: Order details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request - invalid order ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
        - Orders
      summary: Update an order partially by identifier
      description: Update a specific order partially by its identifier
      operationId: updateOrder
      parameters:
        - name: orderId
          in: path
          required: true
          description: The ID of the order to update
          schema:
            $ref: '#/components/schemas/Id'
      requestBody:
        required: true
        description: The updated order details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateRequest'
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request - invalid order details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /payments:
    get:
      tags:
        - Payments
      summary: Get payments
      description: Retrieve a list of all payments
      operationId: getPayments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'
    post:
      tags:
        - Payments
      summary: Create a payment
      description: Create a new payment with the provided details
      operationId: createPayment
      requestBody:
        required: true
        description: The payment details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '201':
          description: Payment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Bad request - invalid payment details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /payments/{paymentId}:
    get:
      tags:
        - Payments
      summary: Find payment by identifier
      description: Retrieve details of a specific payment by its identifier
      operationId: findPaymentById
      parameters:
        - name: paymentId
          in: path
          required: true
          description: The ID of the payment to fetch
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: Payment details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Bad request - invalid payment ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /products:
    get:
      tags:
        - Products
      summary: Get products
      description: Retrieve a list of all products
      operationId: getProducts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'
    post:
      tags:
        - Products
      summary: Create a product
      description: Create a new product with the provided details
      operationId: createProduct
      requestBody:
        required: true
        description: The product details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Bad request - invalid product details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /products/{productId}:
    get:
      tags:
        - Products
      summary: Find product by identifier
      description: Retrieve details of a specific product by its identifier
      operationId: findProductById
      parameters:
        - name: productId
          in: path
          required: true
          description: The ID of the product to fetch
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: Product details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Bad request - invalid product ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
        - Products
      summary: Update a product partially by identifier
      description: Update a specific product partially by its identifier
      operationId: updateProduct
      parameters:
        - name: productId
          in: path
          required: true
          description: The ID of the product to update
          schema:
            $ref: '#/components/schemas/Id'
      requestBody:
        required: true
        description: The product details to update (only include fields that should be updated)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '200':
          description: Product details retrieved and updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Bad request - invalid product ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      tags:
        - Products
      summary: Delete a product
      description: Remove a product from the catalog by its ID
      operationId: deleteProduct
      parameters:
        - name: productId
          in: path
          required: true
          description: The ID of the product to delete
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: Product details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Bad request - invalid product ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /users:
    get:
      tags:
        - Users
      summary: Get users
      description: Retrieve a list of all users
      operationId: getUsers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
    post:
      tags:
        - Users
      summary: Create a user
      description: Create a new user with the provided details
      operationId: createUser
      requestBody:
        required: true
        description: The user details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad request - invalid user details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /users/{userId}:
    get:
      tags:
        - Users
      summary: Find user by identifier
      description: Retrieve details of a specific user by its identifier
      operationId: findUserById
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to fetch
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: User details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad request - invalid user ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
        - Users
      summary: Update a user partially by identifier
      description: Update a specific user partially by its identifier
      operationId: updateUser
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to update
          schema:
            $ref: '#/components/schemas/Id'

      requestBody:
        required: true
        description: The user details to update (only include fields that should be updated)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User details retrieved and deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad request - invalid user ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /users/{userId}/addresses:
    get:
      tags:
        - Users
      summary: Get addresses for a user
      description: Retrieve a list of all addresses associated with a specific user
      operationId: getUserAddresses
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to fetch addresses for
          schema:
            $ref: '#/components/schemas/Id'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of addresses for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressPageResponse'
        '400':
          description: Bad request - invalid user ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /users/{userId}/addresses/{addressId}:
    get:
      tags:
        - Users
      summary: Find address for a user by identifier
      description: Retrieve details of a specific address associated with a specific user by its identifier
      operationId: findUserAddressById
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to fetch the address for
          schema:
            $ref: '#/components/schemas/Id'
        - name: addressId
          in: path
          required: true
          description: The ID of the address to fetch for the user
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: Address details retrieved successfully for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '400':
          description: Bad request - invalid user ID or address ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User or address not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
        - Users
      summary: Add an address for a user
      description: Create a new address associated with a specific user
      operationId: addUserAddress
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to add the address for
          schema:
            $ref: '#/components/schemas/Id'
      requestBody:
        required: true
        description: The address details to create for the user
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressCreateRequest'
      responses:
        '201':
          description: Address created successfully for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '400':
          description: Bad request - invalid user ID or address details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      tags:
        - Users
      summary: Update an address for a user
      description: Update a specific address associated with a specific user by its identifier
      operationId: updateUserAddress
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to update the address for
          schema:
            $ref: '#/components/schemas/Id'
        - name: addressId
          in: path
          required: true
          description: The ID of the address to update for the user
          schema:
            $ref: '#/components/schemas/Id'
      requestBody:
        required: true
        description: The updated address details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressUpdateRequest'
      responses:
        '200':
          description: Address details retrieved and updated successfully for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '400':
          description: Bad request - invalid user ID, address ID, or address details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User or address not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /users/{userId}/orders:
    get:
      tags:
        - Users
      summary: Get orders for a user
      description: Retrieve a list of all orders associated with a specific user
      operationId: getUserOrders
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to fetch orders for
          schema:
            $ref: '#/components/schemas/Id'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: A list of orders for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageResponse'
        '400':
          description: Bad request - invalid user ID supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      tags:
          - Users
      summary: Create an order for a user
      description: Create a new order associated with a specific user
      operationId: createUserOrder
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user to create the order for
          schema:
              $ref: '#/components/schemas/Id'
      requestBody:
        required: true
        description: The order details to create for the user
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Order created successfully for the user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request - invalid user ID or order details supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: User not found
          content:
            application/json:
