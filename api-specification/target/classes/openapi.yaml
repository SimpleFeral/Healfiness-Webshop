components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    basicAuth:
      type: http
      scheme: basic

  parameters:

    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          example: createdBy,asc

    TotalElements:
      name: totalElements
      in: query
      required: false
      schema:
        type: integer
        example: 134

    TotalPages:
      name: totalPages
      in: query
      required: false
      schema:
        type: integer
        example: 7

  schemas:

    # =========================================================
    # COMMON / SHARED
    # =========================================================

    Id:
      type: integer
      format: int64
      readOnly: true
      example: 123

    Money:
      type: number
      format: double
      example: 29.99

    Timestamp:
      type: string
      format: date-time
      example: "2026-05-07T14:30:00Z"

    UserName:
      type: string
      minLength: 3
      maxLength: 15
      example: "johndoe"

    Email:
      type: string
      format: email
      example: "john.doe@mail.com"

    PageMetaData:
      type: object
      properties:
        page:
          type: integer
          example: 0

        size:
          type: integer
          example: 20

        totalElements:
          type: integer
          example: 1

        totalPages:
          type: integer
          example: 1

        last:
          type: boolean
          example: true

        sortOrder:
          $ref: '#/components/schemas/SortOrder'

    PageResponse:
      type: object
      required:
        - content
        - pageMetaData
      properties:
        content:
          type: array
          items: { }

        pageMetaData:
          $ref: '#/components/schemas/PageMetaData'

    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - timestamp
      properties:
        type:
          type: string
          example: "https://api.healfiness.com/errors/validation"

        title:
          type: string
          example: "Validation Error"

        status:
          type: integer
          example: 400

        detail:
          type: string
          example: "Validation failed for request body."

        timestamp:
          $ref: '#/components/schemas/Timestamp'

        violations:
          type: array
          items:
            $ref: '#/components/schemas/ValidationViolation'

    ValidationViolation:
      type: object
      properties:
        field:
          type: string
          example: "email"

        message:
          type: string
          example: "must be a valid email"

    MetaData:
      type: object
      properties:
        createUser:
          $ref: '#/components/schemas/UserName'

        createDate:
          $ref: '#/components/schemas/Timestamp'

        lastModifiedUser:
          $ref: '#/components/schemas/UserName'

        lastModifiedDate:
          $ref: '#/components/schemas/Timestamp'

        version:
          type: integer
          format: int64
          example: 1

    SortOrder:
      type: object
      properties:
        property:
          type: string
          example: "createUser"

        direction:
          type: string
          enum: [ASC, DESC]

    # =========================================================
    # AUTH
    # =========================================================

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          oneOf:
            - $ref: '#/components/schemas/UserName'
            - $ref: '#/components/schemas/Email'

        password:
          type: string
          format: password
          minLength: 8

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string

        refreshToken:
          type: string

        expiresIn:
          type: integer
          example: 3600

        user:
          $ref: '#/components/schemas/UserSummary'

    # =========================================================
    # ENUMS
    # =========================================================

    OrderStatus:
      type: string
      enum:
        - PENDING
        - AWAITING_PAYMENT
        - PAID
        - PROCESSING
        - ON_HOLD
        - BACK_ORDER
        - PARTIALLY_SHIPPED
        - SHIPPED
        - DELIVERED
        - COMPLETED
        - CANCELLED
        - REFUNDED
        - RETURNED
        - FAILED

    AddressType:
      type: string
      enum:
        - HOME
        - DELIVERY
        - PICKUP
        - INVOICE

    PaymentStatus:
      type: string
      enum:
        - PENDING
        - PAID
        - FAILED
        - REFUNDED

    PaymentMethod:
      type: string
      enum:
        - CREDIT_CARD
        - PAYPAL
        - INVOICE
        - KLARNA
        - GOOGLE_PAY
        - SHOP

    ShipmentStatus:
      type: string
      enum:
        - PENDING
        - SHIPPED
        - DELIVERED
        - RETURNED
        - CANCELLED

    ShippingType:
      type: string
      enum:
        - STANDARD
        - EXPRESS
        - PICKUP

    UserRole:
      type: string
      enum:
        - ADMIN
        - SHOP_MANAGER
        - AUTHOR
        - SUPPORT
        - CUSTOMER
        - GUEST

    # =========================================================
    # USER
    # =========================================================

    UserSummary:
      type: object
      required:
        - id
        - username
        - email
      properties:
        id:
          $ref: '#/components/schemas/Id'

        username:
          type: string
          minLength: 3
          maxLength: 15
          example: "johndoe"

        email:
          type: string
          format: email
          example: "john.doe@mail.com"

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          properties:
            firstName:
              type: string
              example: "John"

            lastName:
              type: string
              example: "Doe"

            phoneNumber:
              type: string
              example: "+491234567890"

            role:
              $ref: '#/components/schemas/UserRole'

            addresses:
              type: array
              items:
                $ref: '#/components/schemas/AddressResponse'

            orders:
              type: array
              items:
                $ref: '#/components/schemas/OrderSummary'

            shoppingCarts:
              type: array
              items:
                $ref: '#/components/schemas/ShoppingCartResponse'

            abstractObjectMetaData:
              $ref: '#/components/schemas/MetaData'

    UserPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/UserResponse'

    UserCreateRequest:
      type: object
      required:
        - username
        - email
        - password
        - role
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 15

        email:
          type: string
          format: email

        password:
          type: string
          minLength: 8
          maxLength: 128
          format: password

        firstName:
          type: string

        lastName:
          type: string

        phoneNumber:
          type: string
          example: "+491234567890"

        role:
          $ref: '#/components/schemas/UserRole'

    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email

        password:
          type: string
          minLength: 8
          maxLength: 128
          format: password

        firstName:
          type: string

        lastName:
          type: string

        phoneNumber:
          type: string
          example: "+491234567890"

        role:
          $ref: '#/components/schemas/UserRole'

    # =========================================================
    # CATEGORY
    # =========================================================

    CategorySummary:
      type: object
      required:
        - id
        - name
        - description
      properties:
        id:
          $ref: '#/components/schemas/Id'

        name:
          type: string
          example: "Supplements"

        description:
          type: string
          example: "Products related to dietary supplements."

    CategoryResponse:
      allOf:
        - $ref: '#/components/schemas/CategorySummary'
        - type: object
          properties:

            products:
              type: array
              items:
                $ref: '#/components/schemas/ProductSummary'

            metaData:
              $ref: '#/components/schemas/MetaData'

    CategoryPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/CategoryResponse'

    CategoryCreateRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string

        description:
          type: string

        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductCreateRequest'

    # =========================================================
    # PRODUCT
    # =========================================================

    ProductSummary:
      type: object
      required:
        - id
        - name
        - price
      properties:
        id:
          $ref: '#/components/schemas/Id'

        name:
          type: string
          minLength: 2
          maxLength: 150
          example: "Protein Powder"

        price:
          $ref: '#/components/schemas/Money'

    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          required:
            - stockQuantity
            - category
          properties:
            description:
              type: string
              example: "High-quality whey protein powder."

            stockQuantity:
              type: integer
              example: 100

            category:
              $ref: '#/components/schemas/CategorySummary'

            abstractObjectMetaData:
              $ref: '#/components/schemas/MetaData'

    ProductPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/ProductResponse'

    ProductCreateRequest:
      type: object
      required:
        - name
        - description
        - price
        - stockQuantity
        - categoryId
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 150

        description:
          type: string
          maxLength: 5000

        price:
          $ref: '#/components/schemas/Money'

        stockQuantity:
          type: integer
          minimum: 0

        categoryId:
          $ref: '#/components/schemas/Id'

    # =========================================================
    # COUNTRY / CITY
    # =========================================================

    IsoCountryCodeSummary:
      type: object
      required:
        - isoCountryCodesId
        - isoCountryCode
        - countryName
      properties:
        isoCountryCodesId:
          $ref: '#/components/schemas/Id'

        isoCountryCode:
          type: string
          minLength: 2
          maxLength: 3
          example: "DE"

        countryName:
          type: string
          example: "Germany"

    IsoCountryCodeResponse:
      allOf:
        - $ref: '#/components/schemas/IsoCountryCodeSummary'
        - type: object
          properties:
            abstractObjectMetaData:
              $ref: '#/components/schemas/MetaData'

    IsoCountryCodePageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/IsoCountryCodeResponse'

    CitySummary:
      type: object
      required:
        - citiesId
        - shortName
        - name
      properties:
        citiesId:
          $ref: '#/components/schemas/Id'

        shortName:
          type: string
          minLength: 2
          maxLength: 3
          example: "HAM"

        name:
          type: string
          example: "Hamburg"

    CityResponse:
      allOf:
        - $ref: '#/components/schemas/CitySummary'
        - type: object
          properties:
            isoCountryCode:
              $ref: '#/components/schemas/IsoCountryCodeResponse'

            abstractObjectMetaData:
              $ref: '#/components/schemas/MetaData'

    CityPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/CityResponse'

    CityCreateRequest:
      type: object
      required:
        - name
        - isoCountryCodeId
      properties:
        name:
          type: string

        shortName:
          type: string
          minLength: 2
          maxLength: 5

        isoCountryCodeId:
          $ref: '#/components/schemas/Id'

    # =========================================================
    # ADDRESS
    # =========================================================

    AddressResponse:
      type: object
      required:
        - id
        - street
        - houseNumber
        - postalCode
        - city
        - type
        - userId
      properties:
        id:
          $ref: '#/components/schemas/Id'

        street:
          type: string
          maxLength: 255
          example: "Main Street"

        houseNumber:
          type: string
          maxLength: 20
          example: "42A"

        postalCode:
          type: string
          maxLength: 20
          example: "20095"

        suffix:
          type: string
          maxLength: 20
          nullable: true

        type:
          $ref: '#/components/schemas/AddressType'

        city:
          $ref: '#/components/schemas/CityResponse'

        userId:
          $ref: '#/components/schemas/Id'

        abstractObjectMetaData:
          $ref: '#/components/schemas/MetaData'

    AddressPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/AddressResponse'

    AddressCreateRequest:
      type: object
      required:
        - street
        - houseNumber
        - postalCode
        - city
        - type
        - userId
      properties:
        street:
          type: string

        houseNumber:
          type: string

        postalCode:
          type: string

        suffix:
          type: string
          nullable: true

        city:
          $ref: '#/components/schemas/CityCreateRequest'

        type:
          $ref: '#/components/schemas/AddressType'

        userId:
          $ref: '#/components/schemas/Id'

    AddressUpdateRequest:
      type: object
      properties:
        street:
          type: string

        houseNumber:
          type: string

        postalCode:
          type: string

        suffix:
          type: string
          nullable: true

        city:
          $ref: '#/components/schemas/CityCreateRequest'

        type:
          $ref: '#/components/schemas/AddressType'

    # =========================================================
    # ORDER ITEMS
    # =========================================================

    OrderItemResponse:
      type: object
      required:
        - id
        - quantity
        - product
        - singlePriceAtOrderTime
      properties:
        id:
          $ref: '#/components/schemas/Id'

        quantity:
          type: integer
          minimum: 1
          example: 1

        singlePriceAtOrderTime:
          $ref: '#/components/schemas/Money'

        product:
          $ref: '#/components/schemas/ProductSummary'

        abstractObjectMetaData:
          $ref: '#/components/schemas/MetaData'

    OrderItemCreateRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          $ref: '#/components/schemas/Id'

        quantity:
          type: integer
          minimum: 1

    # =========================================================
    # ORDER
    # =========================================================

    OrderSummary:
      properties:
        id:
          $ref: '#/components/schemas/Id'

        orderStatus:
          $ref: '#/components/schemas/OrderStatus'

        totalAmount:
          $ref: '#/components/schemas/Money'

    OrderResponse:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            orderDate:
              $ref: '#/components/schemas/Timestamp'

            totalQuantity:
              type: integer
              example: 1

            orderItems:
              type: array
              items:
                $ref: '#/components/schemas/OrderItemResponse'

            userId:
              $ref: '#/components/schemas/Id'

            abstractObjectMetaData:
              $ref: '#/components/schemas/MetaData'

    OrderPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/OrderResponse'

    OrderCreateRequest:
      type: object
      required:
        - userId
        - orderItems
        - orderStatus
        - quantity
        - totalAmount
      properties:
        userId:
          $ref: '#/components/schemas/Id'

        orderItems:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemCreateRequest'

        orderStatus:
          $ref: '#/components/schemas/OrderStatus'

        quantity:
          type: integer

        totalAmount:
          $ref: '#/components/schemas/Money'

    OrderUpdateRequest:
      type: object
      properties:
        orderStatus:
          $ref: '#/components/schemas/OrderStatus'

        orderItems:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemCreateRequest'

        quantity:
          type: integer

        totalAmount:
          $ref: '#/components/schemas/Money'

    # =========================================================
    # SHOPPING CART
    # =========================================================

    CartItemResponse:
      type: object
      required:
        - id
        - product
        - quantity
      properties:
        id:
          $ref: '#/components/schemas/Id'

        product:
          $ref: '#/components/schemas/ProductSummary'

        quantity:
          type: integer
          minimum: 1
          example: 1

        abstractObjectMetaData:
          $ref: '#/components/schemas/MetaData'

    CartItemCreateRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          $ref: '#/components/schemas/Id'

        quantity:
          type: integer
          minimum: 1
          example: 1

    ShoppingCartResponse:
      type: object
      required:
        - id
        - items
        - totalAmount
      properties:
        id:
          $ref: '#/components/schemas/Id'

        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'

        totalAmount:
          $ref: '#/components/schemas/Money'

        userId:
          $ref: '#/components/schemas/Id'

        abstractObjectMetaData:
          $ref: '#/components/schemas/MetaData'

    ShoppingCartPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/ShoppingCartResponse'

    ShoppingCartCreateRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          $ref: '#/components/schemas/Id'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemCreateRequest'

    # =========================================================
    # PAYMENT
    # =========================================================

    PaymentResponse:
      type: object
      required:
        - id
        - order
        - paymentStatus
        - paymentMethod
        - paidAt
      properties:
        id:
          $ref: '#/components/schemas/Id'

        order:
          $ref: '#/components/schemas/OrderResponse'

        paymentStatus:
          $ref: '#/components/schemas/PaymentStatus'

        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'

        transactionId:
          type: string
          maxLength: 100
          example: "txn_1234567890"

        paidAt:
          $ref: '#/components/schemas/Timestamp'

        abstractObjectMetaData:
          $ref: '#/components/schemas/MetaData'

    PaymentCreateRequest:
      type: object
      required:
        - orderId
        - paymentMethod
        - paymentStatus
      properties:
        orderId:
          $ref: '#/components/schemas/Id'

        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'

        paymentStatus:
          $ref: '#/components/schemas/PaymentStatus'

    # =========================================================
    # SHIPMENT
    # =========================================================

    ShipmentSummary:
      type: object
      required:
        - shipmentStatus
        - shippingType
      properties:
        id:
          $ref: '#/components/schemas/Id'

        shipmentStatus:
          $ref: '#/components/schemas/ShipmentStatus'

        shippingType:
          $ref: '#/components/schemas/ShippingType'

        trackingNumber:
          type: string
          maxLength: 12
          example: "1Z999AA10123"

    ShipmentResponse:
      allOf:
        - $ref: '#/components/schemas/ShipmentSummary'
        - type: object
          properties:
            order:
              $ref: '#/components/schemas/OrderResponse'

            address:
              $ref: '#/components/schemas/AddressResponse'

            shippedAt:
              $ref: '#/components/schemas/Timestamp'

            abstractObjectMetaData:
              $ref: '#/components/schemas/MetaData'

    ShipmentPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/ShipmentResponse'

    ShipmentCreateRequest:
      allOf:
        - $ref: '#/components/schemas/ShipmentSummary'
        - type: object
          required:
            - orderId
            - addressId
          properties:
            orderId:
              $ref: '#/components/schemas/Id'

            addressId:
              $ref: '#/components/schemas/Id'

    ShipmentUpdateRequest:
      type: object
      properties:
        shipmentStatus:
          $ref: '#/components/schemas/ShipmentStatus'

        shippingType:
          $ref: '#/components/schemas/ShippingType'

        shippedAt:
          $ref: '#/components/schemas/Timestamp'